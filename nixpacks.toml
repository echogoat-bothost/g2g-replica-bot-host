[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = [
  "corepack enable",
  "corepack prepare pnpm@10.26.1 --activate",
  "pnpm install --frozen-lockfile --ignore-scripts"
]

[phases.build]
cmds = [
  "pnpm run typecheck:libs",
  "pnpm --filter @workspace/api-server run build"
]

[start]
cmd = "node artifacts/api-server/dist/index.mjs"
